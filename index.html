<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nex_TI - Iniciando Sistema...</title>
    
    <meta http-equiv="refresh" content="3; url=login/login.html">
    
    <script>
        // O JavaScript também aguarda 4000 milissegundos (4 segundos) antes de redirecionar
        setTimeout(function() {
            window.location.href = "login/login.html";
        }, 4000);
    </script>

    <style>
        body {
            background-color: #0b0c10; 
            color: #00e6e6; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            flex-direction: column;
            /* A mágica do fundo quadriculado acontece aqui: */
            background-image: 
                linear-gradient(rgba(0, 230, 230, 0.03) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(0, 230, 230, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    
    <h2 style="font-weight: normal; letter-spacing: 2px;">
        [ SISTEMA ] Inicializando Nex_TI<span style="animation: blink 1s infinite;">_</span>
    </h2>

</body>
</html>
