<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Game Quest Ti</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300e6e6'><path d='M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z'/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1 id="form-title" class="logo-main tech-font">Game Quest <span class="tech-text">Ti</span></h1>
            <p id="form-subtitle" class="subtitle">Welcome back, developer.</p>
        </div>
        <form class="login-form" onsubmit="handleAuth(event)">
            <div class="form-group" id="group-nome" style="display: none;">
                <label for="nome" class="tech-font">Nickname</label>
                <div class="input-with-icon"><input type="text" id="nome" placeholder="Ex: Maycon"></div>
            </div>
            <div class="form-group">
                <label for="email" class="tech-font">E-mail</label>
                <div class="input-with-icon"><input type="email" id="email" placeholder="dev@quest.com" required></div>
            </div>
            <div class="form-group">
                <label for="password" class="tech-font">Password</label>
                <div class="input-with-icon"><input type="password" id="password" placeholder="••••••••" required></div>
            </div>
            <button type="submit" class="btn-login tech-font" id="btn-submit">> INITIALIZE_LOGIN()</button>
        </form>
        <div class="extra-links">
            <p id="footer-text">Acesso negado? <a href="#" onclick="toggleMode(event)">Solicitar Cadastro</a></p>
        </div>
    </div>
    <script>
        let isLoginMode = true;
        let usersDB = JSON.parse(localStorage.getItem('quest_users')) || {};

        function toggleMode(event) {
            event.preventDefault(); 
            isLoginMode = !isLoginMode; 
            const title = document.getElementById('form-title');
            const subtitle = document.getElementById('form-subtitle');
            const btn = document.getElementById('btn-submit');
            const footerText = document.getElementById('footer-text');
            const groupNome = document.getElementById('group-nome');
            const inputNome = document.getElementById('nome');

            if (isLoginMode) {
                title.innerHTML = 'Game Quest <span class="tech-text">Ti</span>';
                subtitle.innerText = 'Welcome back, developer.';
                btn.innerText = '> INITIALIZE_LOGIN()';
                footerText.innerHTML = 'Acesso negado? <a href="#" onclick="toggleMode(event)">Solicitar Cadastro</a>';
                groupNome.style.display = 'none'; 
                inputNome.required = false;
            } else {
                title.innerHTML = 'New <span class="tech-text">Access</span>';
                subtitle.innerText = 'Join the Grid.';
                btn.innerText = '> CREATE_USER()';
                footerText.innerHTML = 'Já possui ID? <a href="#" onclick="toggleMode(event)">Fazer Login</a>';
                groupNome.style.display = 'block'; 
                inputNome.required = true;
            }
        }
        function handleAuth(event) {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-submit');
            // ACESSO MESTRE ADMIN
            if (isLoginMode && email === "admin@quest.com" && password === "admin") {
                btn.innerText = "Acesso Concedido...";
                localStorage.setItem('quest_user_name', 'Admin');
                // MUDANÇA: Apenas index.html
                setTimeout(() => { window.location.href = 'index.html'; }, 800);
                return;
            }

            // CADASTRO
            if (!isLoginMode) {
                const nome = document.getElementById('nome').value.trim();
                if (usersDB[email]) return mostrarErro("Este ID já existe!");
                if (password.length < 4) return mostrarErro("Senha fraca!");
                usersDB[email] = { nome: nome, senha: password };
                localStorage.setItem('quest_users', JSON.stringify(usersDB));
                btn.innerText = "Registrado! Entrando...";
                localStorage.setItem('quest_user_name', nome);
                // MUDANÇA: Apenas index.html
                setTimeout(() => { window.location.href = 'index.html'; }, 1000);
            } 
            // LOGIN COMUM
            else {
                const user = usersDB[email];
                if (!user || user.senha !== password) return mostrarErro("Acesso Bloqueado!");
                btn.innerText = "Autenticando...";
                localStorage.setItem('quest_user_name', user.nome);
                // MUDANÇA: Apenas index.html
                setTimeout(() => { window.location.href = 'index.html'; }, 1000);
            }
        }
        function mostrarErro(mensagem) {
            const btn = document.getElementById('btn-submit');
            const textoOriginal = btn.innerText;
            btn.innerText = mensagem;
            btn.style.color = "#ff5555"; 
            btn.style.borderColor = "#ff5555";
            setTimeout(() => { btn.innerText = textoOriginal; btn.style.color = "var(--alura-cyan)"; btn.style.borderColor = "var(--alura-cyan)"; }, 2500);
        }
    </script>
</body>
</html>
