<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - English Quest</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="glow-background"></div>

    <div class="login-container">
        <div class="login-card">
            
            <div class="login-header">
                <h1 id="form-title">English <span class="tech-text">Quest</span></h1>
                <p id="form-subtitle">Welcome back, developer.</p>
            </div>

            <form class="login-form" onsubmit="handleAuth(event)">
                
                <div class="input-group" id="group-nome" style="display: none;">
                    <label for="nome">Nome ou Nickname</label>
                    <input type="text" id="nome" placeholder="Ex: Maycon">
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="maycon@exemplo.com" required autocomplete="email">
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <div class="forgot-password" id="forgot-pass-link">
                    <a href="#">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn-login" id="btn-submit">Entrar no Terminal</button>
            </form>

            <div class="login-footer">
                <p id="footer-text">Ainda não tem acesso? <a href="#" onclick="toggleMode(event)">Cadastre-se</a></p>
            </div>

        </div>
    </div>

    <script>
        let isLoginMode = true;
        let usersDB = JSON.parse(localStorage.getItem('quest_users')) || {};

        function toggleMode(event) {
            event.preventDefault(); 
            isLoginMode = !isLoginMode; 

            const title = document.getElementById('form-title');
            const subtitle = document.getElementById('form-subtitle');
            const btn = document.getElementById('btn-submit');
            const footerText = document.getElementById('footer-text');
            const groupNome = document.getElementById('group-nome');
            const forgotPass = document.getElementById('forgot-pass-link');
            const inputNome = document.getElementById('nome');

            if (isLoginMode) {
                title.innerHTML = 'English <span class="tech-text">Quest</span>';
                subtitle.innerText = 'Welcome back, developer.';
                btn.innerText = 'Entrar no Terminal';
                footerText.innerHTML = 'Ainda não tem acesso? <a href="#" onclick="toggleMode(event)">Cadastre-se</a>';
                groupNome.style.display = 'none'; 
                inputNome.required = false;
                forgotPass.style.display = 'block';
            } else {
                title.innerHTML = 'Novo <span class="tech-text">Acesso</span>';
                subtitle.innerText = 'Join the Quest.';
                btn.innerText = 'Criar Conta';
                footerText.innerHTML = 'Já tem acesso? <a href="#" onclick="toggleMode(event)">Faça Login</a>';
                groupNome.style.display = 'flex'; 
                inputNome.required = true;
                forgotPass.style.display = 'none'; 
            }
        }

        // Limpa o cache da sessão anterior para não misturar XP e Coins
        function limparSessaoAnterior() {
            localStorage.removeItem('quest_xp');
            localStorage.removeItem('quest_coins');
            localStorage.removeItem('quest_nivelado');
            localStorage.removeItem('quest_desbloqueadas');
        }

        function handleAuth(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-submit');

            // ACESSO MESTRE ADMIN
            if (isLoginMode && email === "admin@quest.com" && password === "admin") {
                btn.innerText = "Acesso Mestre Concedido...";
                btn.style.background = "var(--alura-purple)";
                limparSessaoAnterior();
                localStorage.setItem('quest_user_name', 'Admin');
                setTimeout(() => { window.location.href = '../index.html'; }, 800);
                return;
            }

            // CADASTRO
            if (!isLoginMode) {
                const nome = document.getElementById('nome').value.trim();
                
                if (usersDB[email]) {
                    mostrarErro("Este e-mail já está cadastrado!");
                    return;
                }
                if (password.length < 4) {
                    mostrarErro("A senha precisa ter no mínimo 4 caracteres.");
                    return;
                }

                usersDB[email] = { nome: nome, senha: password };
                localStorage.setItem('quest_users', JSON.stringify(usersDB));
                
                btn.innerText = "Conta Criada! Entrando...";
                btn.style.background = "var(--alura-green)"; 
                
                limparSessaoAnterior();
                localStorage.setItem('quest_user_name', nome);
                setTimeout(() => { window.location.href = '../index.html'; }, 1000);
            } 
            // LOGIN COMUM
            else {
                const user = usersDB[email];
                
                if (!user || user.senha !== password) {
                    mostrarErro("E-mail ou senha incorretos!");
                    return;
                }

                btn.innerText = "Autenticando...";
                limparSessaoAnterior();
                localStorage.setItem('quest_user_name', user.nome);
                setTimeout(() => { window.location.href = '../index.html'; }, 1000);
            }
        }

        function mostrarErro(mensagem) {
            const btn = document.getElementById('btn-submit');
            const textoOriginal = btn.innerText;
            const corOriginal = btn.style.background;
            
            btn.innerText = mensagem;
            btn.style.background = "#ff5555"; 
            
            setTimeout(() => {
                btn.innerText = textoOriginal;
                btn.style.background = corOriginal;
            }, 2500);
        }
    </script>
</body>
</html>
